<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#09090B" />
    <meta name="description" content="ATPL exam preparation — study, practice, and track your progress" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="ATPL Practice" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
    <title>ATPL Practice</title>
    <style>
      * { box-sizing: border-box; }
      body { margin: 0; background: #09090B; }
      #root { min-height: 100vh; }
      /* Prevent flash of unstyled content */
      #loading-screen {
        position: fixed; inset: 0; background: #09090B;
        display: flex; align-items: center; justify-content: center;
        z-index: 9999; transition: opacity 0.3s;
      }
      #loading-screen.hidden { opacity: 0; pointer-events: none; }
      .loading-plane {
        width: 48px; height: 48px; border-radius: 12px;
        background: linear-gradient(135deg, #1A3A6B, #2E5FA3);
        display: flex; align-items: center; justify-content: center;
        animation: pulse-icon 1.5s ease infinite;
      }
      @keyframes pulse-icon { 0%,100%{opacity:1;transform:scale(1);} 50%{opacity:0.7;transform:scale(0.95);} }
    </style>
  </head>
  <body>
    <!-- Loading screen while React hydrates -->
    <div id="loading-screen">
      <div class="loading-plane">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#3B9EFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M17.8 19.2 16 11l3.5-3.5C21 6 21 4 19.5 2.5c-1.5-1.5-3.5-1.5-5 0L11 6 2.8 4.2c-.5-.1-.9.1-1.1.5l-.3.5c-.2.5-.1 1 .3 1.3L7 11l-2 3H2l-1 1 3 2 2 3 1-1v-3l3-2 3.5 5.3c.3.4.8.5 1.3.3l.5-.2c.4-.3.6-.7.5-1.2z"/>
        </svg>
      </div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      // Register service worker
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js', { scope: '/' })
            .then(reg => console.log('[SW] Registered'))
            .catch(err => console.warn('[SW] Failed:', err));
        });
      }
      // Hide loading screen once React mounts
      document.addEventListener('DOMContentLoaded', () => {
        setTimeout(() => {
          const el = document.getElementById('loading-screen');
          if (el) el.classList.add('hidden');
          setTimeout(() => el && el.remove(), 300);
        }, 400);
      });
    </script>
  </body>
</html>
